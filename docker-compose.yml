services:
  happy-sorter:
    build: .
    container_name: happy-sorter
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config:/config             # DB + config.yaml
      - ./library:/library           # organised library output
      - ./watch:/watch                # drop folder (must be writable — HappySorter moves files out of it)
    environment:
      - TZ=UTC
